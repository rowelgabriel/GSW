<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/jpeg" href="images/gsw-logo.png">
  <title>Golden State Warriors</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav id="navbar" class="navbar navbar-expand-lg bg-light shadow fixed-top px-sm-3 px-1 py-2">
    <div class="container-fluid">
      <div class="navbar-brand fw-bold text-primary">
        <img class="me-1 align-text-top" src="images/gsw-logo.png" height="30">Golden State Warriors
      </div>
      <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <button class="btn btn-outline-dark border-2 ms-2 d-lg-none theme-button" onclick="changeTheme()">
        <i class="bi bi-moon-fill"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item px-lg-3">
            <a class="nav-link text-dark fw-semibold" href="#home">
              <i class="bi bi-house-door-fill me-2"></i>Home
            </a>
          </li>
          <li class="nav-item px-lg-3">
            <a class="nav-link text-dark fw-semibold" href="#team">
              <i class="bi bi-people-fill me-2"></i>Team
            </a>
          </li>
          <li class="nav-item px-lg-3">
            <a class="nav-link text-dark fw-semibold" href="#playoffs">
              <i class="bi bi-trophy-fill me-2"></i>Playoffs
            </a>
          </li>
        </ul>
      </div>
      <button class="btn btn-outline-dark border-2 ms-2 d-none d-lg-inline-block theme-button" onclick="changeTheme()">
        <i class="bi bi-moon-fill"></i>
      </button>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
